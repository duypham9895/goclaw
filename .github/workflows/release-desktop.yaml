name: Release Desktop

on:
  push:
    tags: ['lite-v*']

# lite-v1.0.0       → stable release (prerelease: false)
# lite-v1.0.0-beta.1 → beta release  (prerelease: true)

permissions:
  contents: write

env:
  GITHUB_REPO: ${{ github.repository }}

jobs:
  # ── macOS builds (arm64 native + amd64 cross-compile on same runner) ──
  build-macos:
    strategy:
      matrix:
        include:
          - arch: arm64
          - arch: amd64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/desktop/frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#lite-v}" >> "$GITHUB_OUTPUT"

      - name: Patch wails.json version
        working-directory: ui/desktop
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.info.productVersion = $v' wails.json > wails.json.tmp \
            && mv wails.json.tmp wails.json

      - name: Build desktop app
        working-directory: ui/desktop
        env:
          GOARCH: ${{ matrix.arch }}
        run: |
          wails build -tags sqliteonly \
            -ldflags "-s -w -X github.com/nextlevelbuilder/goclaw/cmd.Version=${{ steps.version.outputs.version }}"

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R ui/desktop/build/bin/goclaw-lite.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "GoClaw Lite ${{ steps.version.outputs.version }}" \
            -srcfolder dmg-staging -ov -format UDZO \
            "goclaw-lite-${{ steps.version.outputs.version }}-darwin-${{ matrix.arch }}.dmg"

      - name: Create tar.gz (for auto-update)
        run: |
          cd ui/desktop/build/bin
          tar czf "../../../../goclaw-lite-${{ steps.version.outputs.version }}-darwin-${{ matrix.arch }}.tar.gz" \
            goclaw-lite.app

      # TODO: Add code signing when Apple Developer cert is available
      # - name: Sign app
      #   run: codesign --deep --force --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" ...

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            goclaw-lite-*.dmg
            goclaw-lite-*.tar.gz

  # ── Windows build ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/desktop/frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#lite-v}" >> "$GITHUB_OUTPUT"

      - name: Patch wails.json version
        working-directory: ui/desktop
        shell: pwsh
        run: |
          $json = Get-Content wails.json | ConvertFrom-Json
          $json.info.productVersion = "${{ steps.version.outputs.version }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content wails.json

      - name: Build desktop app
        working-directory: ui/desktop
        shell: bash
        run: |
          wails build -tags sqliteonly \
            -ldflags "-s -w -X github.com/nextlevelbuilder/goclaw/cmd.Version=${{ steps.version.outputs.version }}"

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path "ui/desktop/build/bin/goclaw-lite.exe" `
            -DestinationPath "goclaw-lite-${{ steps.version.outputs.version }}-windows-amd64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-amd64
          path: goclaw-lite-*.zip

  # ── Create GitHub Release ──
  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#lite-v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "GoClaw Lite v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
